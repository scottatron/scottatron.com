name: Export PDF

on:
  push:
    branches: ['main']
    tags-ignore: ['*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export_pdf:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set version
        run: echo "version=$(git log -1 --date=format:%Y-%m-%d --pretty=format:%cd-%h)" >> $GITHUB_ENV

      - name: Wait until Netlify has deployed
        if: ${{ github.ref_name == 'main' }}
        run: |
          until make deployed
          do
            echo "Waiting for Netlify to deploy..."
            sleep 1
          done

      - name: Allow workflow processes to control Safari
        run: |
          epochdate=$(($(date +'%s * 1000 + %-N / 1000000')))
          tcc_db="/Users/runner/Library/Application Support/com.apple.TCC/TCC.db"
          safari_bundle_id="com.apple.Safari"

          clients=(
            "/bin/bash"
            "/usr/bin/osascript"
          )

          while IFS= read -r agent_pid; do
            agent_path=$(ps -p "$agent_pid" -o comm=)
            if [[ -n "$agent_path" ]]; then
              clients+=("$agent_path")
            fi
          done < <(pgrep -x hosted-compute-agent || true)

          for client in "${clients[@]}"; do
            echo "Allowing $client to control Safari"
            sqlite3 "$tcc_db" "
              replace into access (
                service,
                client,
                client_type,
                auth_value,
                auth_reason,
                auth_version,
                indirect_object_identifier_type,
                indirect_object_identifier,
                flags,
                last_modified
              ) values (
                'kTCCServiceAppleEvents',
                '$client',
                1,
                2,
                4,
                1,
                0,
                '$safari_bundle_id',
                0,
                $epochdate
              );
            "
          done

          echo "Allowing hosted-compute-agent to control Safari"
          sqlite3 "$tcc_db" "
            replace into access (
              service,
              client,
              client_type,
              auth_value,
              auth_reason,
              auth_version,
              indirect_object_identifier_type,
              indirect_object_identifier,
              flags,
              last_modified
            ) values (
              'kTCCServiceAppleEvents',
              'hosted-compute-agent',
              0,
              2,
              4,
              1,
              0,
              '$safari_bundle_id',
              0,
              $epochdate
            );
          "

      - name: Export webpage as PDF
        run: |
          cat > allow_safari_prompt.scpt <<-EOF
          repeat 600 times
            tell application "System Events"
              repeat with appProcess in application processes
                try
                  if exists button "Allow" of window 1 of appProcess then
                    click button "Allow" of window 1 of appProcess
                    return
                  end if
                end try
              end repeat
            end tell
            delay 0.2
          end repeat
          EOF
          osascript allow_safari_prompt.scpt &
          open -a Safari "https://www.scottatron.com"
          sleep 15
          pdf_file="Scott-Arthur-CV-${{ env.version }}.pdf"
          output_dir="$PWD"

          cat > safari_export_pdf.scpt <<-EOF
          tell application "System Events"
            tell process "Safari"
              set frontmost to true
              set size of window 1 to {960, 1080}
              delay 1
              click menu item "Export as PDF…" of menu "File" of menu bar 1
              with timeout of 30 seconds
                repeat until exists sheet 1 of window 1
                  delay 0.1
                end repeat
              end timeout
              set outputFolder to "$output_dir"
              set theFile to "$pdf_file"
              keystroke "g" using {command down, shift down}
              delay 0.5
              keystroke outputFolder
              key code 36
              delay 0.5
              keystroke "a" using {command down}
              keystroke theFile
              key code 36
              delay 2
            end tell
          end tell
          EOF
          osascript safari_export_pdf.scpt
          if [[ ! -f "$pdf_file" ]]; then
            echo "Expected PDF was not written to $PWD/$pdf_file; searching for Safari output..."
            find "$PWD" "$HOME" -maxdepth 5 -type f -name '*.pdf' -print
            found_pdf=$(find "$PWD" "$HOME" -maxdepth 5 -type f -name '*.pdf' -print -quit)
            if [[ -n "$found_pdf" ]]; then
              mv "$found_pdf" "$pdf_file"
            fi
          fi
          test -s "$pdf_file"
        # https://github.com/create-dmg/create-dmg/issues/72#issuecomment-959514966

      - run: screencapture screen.png
        if: ${{ failure() }}

      - uses: actions/upload-artifact@v4
        with:
          name: screen.png
          path: screen.png
        if: ${{ failure() }}

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf
          path: Scott-Arthur-CV-${{ env.version }}.pdf

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "*.pdf"
          tag: ${{ env.version }}
          makeLatest: true
        if: ${{ github.ref == 'refs/heads/main' }}
