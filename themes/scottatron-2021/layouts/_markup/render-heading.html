{{- $level := .Level -}}
{{- $anchor := .Anchor -}}
{{- $m := findRESubmatch `^(\d{4}\s*[-–]\s*(?:\d{4}|[Pp]resent))\s*[—–-]\s*(.+)$` (string .Text) -}}
{{- with $m -}}
<h{{ $level }} id="{{ $anchor | safeURL }}" class="cv-entry"><span class="cv-date">{{ replace (index (index . 0) 1) "-" "–" }}</span><span class="cv-role">{{ index (index . 0) 2 | safeHTML }}</span></h{{ $level }}>
{{- else -}}
<h{{ $level }} id="{{ $anchor | safeURL }}">{{ .Text }}</h{{ $level }}>
{{- end -}}
